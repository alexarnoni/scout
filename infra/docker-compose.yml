services:
  db:
    image: postgres:16
    container_name: scout-postgres
    environment:
      POSTGRES_DB: scout
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout
    ports:
      - "5433:5432"
    volumes:
      - scout_pgdata:/var/lib/postgresql/data

  backend:
    build: ../backend
    container_name: scout-backend
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      - db
    volumes:
      - scout-mv-cache:/app/data
    restart: always

volumes:
  scout_pgdata:
  scout-mv-cache:
